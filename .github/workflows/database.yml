# Database migrations: validate on PR, apply on main when supabase/ changes.
# Requires secrets: SUPABASE_ACCESS_TOKEN, SUPABASE_DB_PROJECT_ID

name: Database

on:
  pull_request:
    branches: [main, dev]
    paths:
      - "supabase/**"
      - "scripts/db-validate.mjs"
      - ".github/workflows/database.yml"
  push:
    branches: [main]
    paths:
      - "supabase/**"
      - "scripts/db-validate.mjs"
      - ".github/workflows/database.yml"
  workflow_dispatch:

concurrency:
  group: database-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate migrations
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile

      - run: pnpm db:validate

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Lint migrations (SQL)
        run: supabase db lint --level warning
        continue-on-error: true

  push-remote:
    name: Apply migrations (remote)
    needs: validate
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link project and push migrations
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PROJECT_ID: ${{ secrets.SUPABASE_DB_PROJECT_ID }}
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ] || [ -z "$SUPABASE_DB_PROJECT_ID" ]; then
            echo "::warning::Skipping db push — set SUPABASE_ACCESS_TOKEN and SUPABASE_DB_PROJECT_ID in repo secrets."
            exit 0
          fi
          supabase link --project-ref "$SUPABASE_DB_PROJECT_ID" --yes
          supabase db push
