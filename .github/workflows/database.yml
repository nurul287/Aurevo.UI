# Supabase: validate on PR; on push to main apply migrations, lint, and deploy edge functions.
# Requires secrets: SUPABASE_ACCESS_TOKEN, SUPABASE_DB_PROJECT_ID
# Edge Function secrets (META_PIXEL_ID, etc.) are set in Supabase Dashboard, not in GitHub.

name: Database

on:
  pull_request:
    branches: [main, dev]
    paths:
      - "supabase/**"
      - "scripts/db-validate.mjs"
      - ".github/workflows/database.yml"
  push:
    branches: [main]
    paths:
      - "supabase/**"
      - "scripts/db-validate.mjs"
      - ".github/workflows/database.yml"
  workflow_dispatch:

# Manual runs only validate. Remote apply runs on push to main (not workflow_dispatch).
concurrency:
  group: database-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate migrations
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v5
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile

      - run: pnpm db:validate

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.1.4

      - name: Typecheck edge functions
        run: |
          shopt -s nullglob
          for entry in supabase/functions/*/index.ts; do
            echo "deno check $entry"
            deno check "$entry"
          done

  push-remote:
    name: Apply migrations (remote)
    needs: validate
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link project and push migrations
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PROJECT_ID: ${{ secrets.SUPABASE_DB_PROJECT_ID }}
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ] || [ -z "$SUPABASE_DB_PROJECT_ID" ]; then
            echo "::warning::Skipping db push — set SUPABASE_ACCESS_TOKEN and SUPABASE_DB_PROJECT_ID in repo secrets."
            exit 0
          fi
          supabase link --project-ref "$SUPABASE_DB_PROJECT_ID" --yes
          # Push first so new migrations fix functions on remote, then lint the live schema.
          supabase db push
          supabase db lint --linked --level warning --fail-on error

  deploy-edge-functions:
    name: Deploy edge functions (remote)
    needs: [validate, push-remote]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link project and deploy functions
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PROJECT_ID: ${{ secrets.SUPABASE_DB_PROJECT_ID }}
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ] || [ -z "$SUPABASE_DB_PROJECT_ID" ]; then
            echo "::warning::Skipping functions deploy — set SUPABASE_ACCESS_TOKEN and SUPABASE_DB_PROJECT_ID in repo secrets."
            exit 0
          fi
          if [ ! -d supabase/functions ] || [ -z "$(find supabase/functions -mindepth 1 -maxdepth 1 -type d 2>/dev/null)" ]; then
            echo "No edge functions to deploy."
            exit 0
          fi
          supabase link --project-ref "$SUPABASE_DB_PROJECT_ID" --yes
          supabase functions deploy --project-ref "$SUPABASE_DB_PROJECT_ID"
